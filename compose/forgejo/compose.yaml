configs:
    ts-serve:
        content: |
            {"TCP":{"443":{"HTTPS":true}},
            "Web":{"$${TS_CERT_DOMAIN}:443":
                {"Handlers":{"/":
                {"Proxy":"http://127.0.0.1:3000"}}}},
            "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
    forgejo-ts:
        image: tailscale/tailscale:latest
        container_name: forgejo-ts
        hostname: forgejo
        environment:
            - TS_AUTHKEY=${TS_AUTHKEY}
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_SERVE_CONFIG=/config/serve.json
            - TS_EXTRA_ARGS=--advertise-tags=tag:server,tag:container,tag:forgejo --ssh=false
        volumes:
            - ./ts-state:/var/lib/tailscale
        configs:
            - source: ts-serve
              target: /config/serve.json
        devices:
            - /dev/net/tun:/dev/net/tun
        cap_add:
            - NET_ADMIN
            - SYS_MODULE
        networks:
            - tsbridge-network
        restart: unless-stopped

    forgejo:
        image: codeberg.org/forgejo/forgejo:11
        container_name: forgejo
        network_mode: service:forgejo-ts
        environment:
            - USER_UID=1000
            - USER_GID=1000
            # https://forgejo.org/docs/latest/admin/config-cheat-sheet/
            - FORGEJO__server__ROOT_URL=https://${FORGEJO_HOSTNAME}
            - FORGEJO__server__SSH_DOMAIN=${FORGEJO_HOSTNAME}
        volumes:
            - /mnt/data/git:/data
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        # ports:
        #   - '3000:3000'
        #   - '222:22'
        restart: unless-stopped

networks:
    tsbridge-network:
        external: true
