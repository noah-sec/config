services:
    tsdproxy:
        image: almeidapaulopt/tsdproxy:2
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - datadir:/data
            - ./config:/config
        restart: unless-stopped
        ports:
            - "8080:8080"
        extra_hosts:
            - "host.docker.internal:host-gateway"
volumes:
    datadir:
